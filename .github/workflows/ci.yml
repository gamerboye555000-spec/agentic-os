name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-integrity:
    name: workflow-integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Verify workflow integrity
        run: python3 tools/verify_ci_workflow.py

  tests-python-3-12:
    name: tests-python-3.12
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Compile all sources
        run: python3 -m compileall -q agentic_os tests tools aos.py aos_hooks.py
      - name: Run the full test suite
        run: python3 -m unittest discover -s tests
      - name: Verify protocol projection
        run: python3 tools/gen_protocols.py
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          status="$(git status --porcelain)"
          test -z "$status"

  tests-python-3-14:
    name: tests-python-3.14
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.14"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Compile all sources
        run: python3 -m compileall -q agentic_os tests tools aos.py aos_hooks.py
      - name: Run the full test suite
        run: python3 -m unittest discover -s tests
      - name: Verify protocol projection
        run: python3 tools/gen_protocols.py
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          status="$(git status --porcelain)"
          test -z "$status"

  distribution-smoke-python-3-12:
    name: distribution-smoke-python-3.12
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Install pinned build tools
        run: |
          set -euo pipefail
          python3 -m pip install pip==26.1.2
          python3 -m pip install build==1.5.0 setuptools==83.0.0 packaging==26.2 pyproject_hooks==1.2.0
          python3 -m pip freeze
      - name: Build the wheel
        run: python3 -m build --wheel --no-isolation --outdir "$RUNNER_TEMP/dist"
      - name: Assert wheel membership
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, os, re, sys, zipfile
          def fail(message):
              print("wheel: " + message)
              sys.exit(1)
          runner_temp = os.environ["RUNNER_TEMP"]
          wheels = sorted(glob.glob(os.path.join(runner_temp, "dist", "agentic_os-*.whl")))
          if len(wheels) != 1:
              fail("expected exactly one wheel, found " + str(len(wheels)))
          source_py = {}
          for path in glob.glob("agentic_os/**/*.py", recursive=True):
              if "__pycache__" in path.split(os.sep):
                  continue
              with open(path, "rb") as handle:
                  source_py[path.replace(os.sep, "/")] = handle.read()
          if not source_py:
              fail("no source package modules found")
          source_catalog = {}
          for path in sorted(glob.glob(os.path.join("agentic_os", "catalog", "*.json"))):
              with open(path, "rb") as handle:
                  source_catalog[path.replace(os.sep, "/")] = handle.read()
          if len(source_catalog) != 13:
              fail("expected 13 source catalog json files, found " + str(len(source_catalog)))
          dist_info_member = re.compile(r"^(agentic_os-[^/]+\.dist-info)/[^/]+$")
          dist_info_root = re.compile(r"^agentic_os-[^/]+\.dist-info$")
          def unsafe(name):
              bare = name[:-1] if name.endswith("/") else name
              if not bare or "\x00" in name or "\\" in name or name.startswith("/"):
                  return True
              if len(name) > 1 and name[0].isascii() and name[0].isalpha() and name[1] == ":":
                  return True
              return any(part in ("", ".", "..") for part in bare.split("/"))
          seen = set()
          seen_folded = set()
          wheel_py = {}
          wheel_catalog = {}
          dist_info_roots = set()
          with zipfile.ZipFile(wheels[0]) as archive:
              for name in archive.namelist():
                  if unsafe(name):
                      fail("unsafe member path")
                  if name in seen:
                      fail("duplicate member")
                  seen.add(name)
                  folded = name.lower()
                  if folded in seen_folded:
                      fail("case-folded duplicate member")
                  seen_folded.add(folded)
                  if name.endswith("/"):
                      top = name.split("/", 1)[0]
                      if top != "agentic_os" and not dist_info_root.match(top):
                          fail("unexpected directory entry")
                      continue
                  if name in source_py:
                      wheel_py[name] = archive.read(name)
                  elif name in source_catalog:
                      wheel_catalog[name] = archive.read(name)
                  else:
                      match = dist_info_member.match(name)
                      if not match:
                          fail("unexpected member")
                      dist_info_roots.add(match.group(1))
          if wheel_py.keys() != source_py.keys():
              fail("package modules do not match the source tree")
          for name, data in source_py.items():
              if wheel_py[name] != data:
                  fail("package module bytes differ from the source tree")
          if wheel_catalog.keys() != source_catalog.keys():
              fail("catalog json set does not match the source tree")
          for name, data in source_catalog.items():
              if wheel_catalog[name] != data:
                  fail("catalog json bytes differ from the source tree")
          if len(dist_info_roots) != 1:
              fail("expected exactly one dist-info root, found " + str(len(dist_info_roots)))
          print("wheel membership OK: " + str(len(seen)) + " members")
          PY
      - name: Install the wheel and smoke the console script
        run: |
          set -euo pipefail
          unset PYTHONPATH
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --no-deps "$RUNNER_TEMP"/dist/agentic_os-*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv/bin/aos" --help
          mkdir -p "$RUNNER_TEMP/ws-wheel"
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" init
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" status
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" doctor
          "$RUNNER_TEMP/venv/bin/aos" protocol verify-registry
      - name: Build the zipapp
        run: python3 tools/build_zipapp.py --output "$RUNNER_TEMP/aos.pyz"
      - name: Assert zipapp membership
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, os, sys, zipfile
          def fail(message):
              print("zipapp: " + message)
              sys.exit(1)
          runner_temp = os.environ["RUNNER_TEMP"]
          expected = {}
          with open(os.path.join("agentic_os", "__main__.py"), "rb") as handle:
              expected["__main__.py"] = handle.read()
          for path in glob.glob("agentic_os/**/*.py", recursive=True):
              if "__pycache__" in path.split(os.sep):
                  continue
              with open(path, "rb") as handle:
                  expected[path.replace(os.sep, "/")] = handle.read()
          for path in sorted(glob.glob(os.path.join("agentic_os", "catalog", "*.json"))):
              with open(path, "rb") as handle:
                  expected[path.replace(os.sep, "/")] = handle.read()
          def unsafe(name):
              bare = name[:-1] if name.endswith("/") else name
              if not bare or "\x00" in name or "\\" in name or name.startswith("/"):
                  return True
              if len(name) > 1 and name[0].isascii() and name[0].isalpha() and name[1] == ":":
                  return True
              return any(part in ("", ".", "..") for part in bare.split("/"))
          seen = set()
          seen_folded = set()
          payload = {}
          with zipfile.ZipFile(os.path.join(runner_temp, "aos.pyz")) as archive:
              for name in archive.namelist():
                  if unsafe(name):
                      fail("unsafe member path")
                  if name in seen:
                      fail("duplicate member")
                  seen.add(name)
                  folded = name.lower()
                  if folded in seen_folded:
                      fail("case-folded duplicate member")
                  seen_folded.add(folded)
                  if name.endswith("/"):
                      if name.split("/", 1)[0] != "agentic_os":
                          fail("unexpected directory entry")
                      continue
                  if name not in expected:
                      fail("unexpected member")
                  payload[name] = archive.read(name)
          if payload.keys() != expected.keys():
              fail("archive members do not match the source tree")
          for name, data in expected.items():
              if payload[name] != data:
                  fail("archive member bytes differ from the source tree")
          print("zipapp membership OK: " + str(len(seen)) + " members")
          PY
      - name: Smoke the zipapp
        run: |
          set -euo pipefail
          unset PYTHONPATH
          cd "$RUNNER_TEMP"
          python3 "$RUNNER_TEMP/aos.pyz" --help
          mkdir -p "$RUNNER_TEMP/ws-zipapp"
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" init
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" status
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" doctor
          python3 "$RUNNER_TEMP/aos.pyz" protocol verify-registry
      - name: Assert entrypoint help equivalence
        run: |
          set -euo pipefail
          unset PYTHONPATH
          console_help="$("$RUNNER_TEMP/venv/bin/aos" --help)"
          module_help="$(cd "$GITHUB_WORKSPACE" && python3 -m agentic_os --help)"
          zipapp_help="$(python3 "$RUNNER_TEMP/aos.pyz" --help)"
          test "$console_help" = "$module_help"
          test "$console_help" = "$zipapp_help"
      - name: Clean up bounded build residue
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          ignored_residue="$(git status --porcelain --ignored)"
          unexpected="$(grep '^!!' <<<"$ignored_residue" | grep -vE '^!! (build/|agentic_os\.egg-info/)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "distribution-smoke: unexpected ignored residue present"
            exit 1
          fi
          rm -rf build agentic_os.egg-info
          test ! -e build
          test ! -e agentic_os.egg-info
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          status="$(git status --porcelain)"
          test -z "$status"
