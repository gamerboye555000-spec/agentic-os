name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-integrity:
    name: workflow-integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Verify workflow integrity
        run: python3 tools/verify_ci_workflow.py

  tests-python-3-12:
    name: tests-python-3.12
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Compile all sources
        run: python3 -m compileall -q agentic_os tests tools aos.py aos_hooks.py
      - name: Run the full test suite
        run: python3 -m unittest discover -s tests
      - name: Verify protocol projection
        run: python3 tools/gen_protocols.py
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          test -z "$(git status --porcelain)"

  tests-python-3-14:
    name: tests-python-3.14
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.14"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Compile all sources
        run: python3 -m compileall -q agentic_os tests tools aos.py aos_hooks.py
      - name: Run the full test suite
        run: python3 -m unittest discover -s tests
      - name: Verify protocol projection
        run: python3 tools/gen_protocols.py
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          test -z "$(git status --porcelain)"

  distribution-smoke-python-3-12:
    name: distribution-smoke-python-3.12
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1        # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97    # v7.0.0
        with:
          python-version: "3.12"
      - name: Print interpreter and platform
        run: python3 -VV && python3 -m pip --version && uname -a
      - name: Install pinned build tools
        run: |
          set -euo pipefail
          python3 -m pip install pip==26.1.2
          python3 -m pip install build==1.5.0 setuptools==83.0.0 packaging==26.2 pyproject_hooks==1.2.0
          python3 -m pip freeze
      - name: Build the wheel
        run: python3 -m build --wheel --no-isolation --outdir "$RUNNER_TEMP/dist"
      - name: Assert wheel membership
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, os, re, sys, zipfile
          runner_temp = os.environ["RUNNER_TEMP"]
          wheels = sorted(glob.glob(os.path.join(runner_temp, "dist", "agentic_os-*.whl")))
          if len(wheels) != 1:
              print("wheel: expected exactly one wheel, found", len(wheels))
              sys.exit(1)
          passport = re.compile(r"^agentic_os/catalog/[a-z][a-z0-9._-]*\.v[1-9][0-9]*\.passport\.json$")
          dist_info = re.compile(r"^agentic_os-[^/]+\.dist-info/.+$")
          def allowed(name):
              if name.startswith("agentic_os/") and name.endswith(".py"):
                  return True
              if name == "agentic_os/catalog/manifest.json":
                  return True
              return passport.match(name) is not None or dist_info.match(name) is not None
          with zipfile.ZipFile(wheels[0]) as archive:
              members = [n for n in archive.namelist() if not n.endswith("/")]
              wheel_catalog = {}
              for name in members:
                  if not allowed(name):
                      print("wheel: unexpected member", name)
                      sys.exit(1)
                  if name.startswith("agentic_os/catalog/") and name.endswith(".json"):
                      wheel_catalog[os.path.basename(name)] = archive.read(name)
          source_catalog = {}
          for path in sorted(glob.glob("agentic_os/catalog/*.json")):
              with open(path, "rb") as handle:
                  source_catalog[os.path.basename(path)] = handle.read()
          if len(source_catalog) != 13:
              print("wheel: expected 13 source catalog json files, found", len(source_catalog))
              sys.exit(1)
          if wheel_catalog != source_catalog:
              print("wheel: catalog json does not byte-match the source tree")
              sys.exit(1)
          print("wheel membership OK:", len(members), "members")
          PY
      - name: Install the wheel and smoke the console script
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --no-deps "$RUNNER_TEMP"/dist/agentic_os-*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv/bin/aos" --help
          mkdir -p "$RUNNER_TEMP/ws-wheel"
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" init
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" status
          "$RUNNER_TEMP/venv/bin/aos" --root "$RUNNER_TEMP/ws-wheel" doctor
          "$RUNNER_TEMP/venv/bin/aos" protocol verify-registry
      - name: Build the zipapp
        run: python3 tools/build_zipapp.py --output "$RUNNER_TEMP/aos.pyz"
      - name: Assert zipapp membership
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, sys, zipfile
          runner_temp = os.environ["RUNNER_TEMP"]
          passport = re.compile(r"^agentic_os/catalog/[a-z][a-z0-9._-]*\.v[1-9][0-9]*\.passport\.json$")
          def allowed(name):
              if name == "__main__.py":
                  return True
              if name.startswith("agentic_os/") and name.endswith(".py"):
                  return True
              if name == "agentic_os/catalog/manifest.json":
                  return True
              return passport.match(name) is not None
          with zipfile.ZipFile(os.path.join(runner_temp, "aos.pyz")) as archive:
              members = [n for n in archive.namelist() if not n.endswith("/")]
              for name in members:
                  if not allowed(name):
                      print("zipapp: unexpected member", name)
                      sys.exit(1)
          print("zipapp membership OK:", len(members), "members")
          PY
      - name: Smoke the zipapp
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          python3 "$RUNNER_TEMP/aos.pyz" --help
          mkdir -p "$RUNNER_TEMP/ws-zipapp"
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" init
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" status
          python3 "$RUNNER_TEMP/aos.pyz" --root "$RUNNER_TEMP/ws-zipapp" doctor
          python3 "$RUNNER_TEMP/aos.pyz" protocol verify-registry
      - name: Assert entrypoint help equivalence
        run: |
          set -euo pipefail
          console_help="$("$RUNNER_TEMP/venv/bin/aos" --help)"
          module_help="$(cd "$GITHUB_WORKSPACE" && python3 -m agentic_os --help)"
          zipapp_help="$(python3 "$RUNNER_TEMP/aos.pyz" --help)"
          test "$console_help" = "$module_help"
          test "$console_help" = "$zipapp_help"
      - name: Clean up bounded build residue
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          unexpected="$(git status --porcelain --ignored | grep '^!!' | grep -vE '^!! (build/|agentic_os\.egg-info/)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "distribution-smoke: unexpected ignored residue present"
            exit 1
          fi
          rm -rf build agentic_os.egg-info
          test ! -e build
          test ! -e agentic_os.egg-info
      - name: Assert a clean working tree
        run: |
          set -euo pipefail
          git diff --exit-code
          test -z "$(git status --porcelain)"
